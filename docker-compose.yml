services:
  mysql-player:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: playerdb
      MYSQL_ROOT_PASSWORD: mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-player:
    build: .
    expose:
      - "8080"
    depends_on:
      mysql-player:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-player:3306/playerdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysql
    restart: on-failure

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-player
    restart: always